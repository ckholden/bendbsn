<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>if(location.protocol!=='https:'&&location.hostname!=='localhost'){location.replace('https:'+location.href.substring(location.protocol.length));}</script>
    <script>if(localStorage.getItem('bendbsn_auth')!=='true'){window.location.href='/';}</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#0f7490">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/logo-mark.svg" type="image/svg+xml">
    <link rel="icon" href="/favicon.ico">
    <link rel="stylesheet" href="/shared/header.css">
    <link rel="stylesheet" href="/shared/toast.css">
    <link rel="stylesheet" href="/shared/clinical-ui.css">
    <link rel="stylesheet" href="/shared/app-shell.css">
    <title>Clinical Packet — BendBSN</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh; min-height: 100dvh;
            display: flex; flex-direction: column;
            background: var(--clx-bg-canvas, #f0f4f8);
            color: var(--clx-text-primary, #1a3a5c);
        }

        /* Sticky editor head — packet title + status + module toggle */
        .cap-editor-head {
            position: sticky;
            top: 56px;             /* below site-header */
            z-index: 50;
            background: var(--clx-bg-surface, #fff);
            border-bottom: 1px solid var(--clx-border, #d1dce8);
            padding: 10px 20px;
            display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
        }
        .cap-back {
            font-size: 12.5px;
            color: var(--clx-text-secondary, #4a5568);
            text-decoration: none;
            padding: 4px 10px;
            border-radius: 5px;
            border: 1px solid var(--clx-border, #d1dce8);
            background: var(--clx-bg-surface-2, #f7f9fc);
        }
        .cap-back:hover { background: var(--clx-bg-hover, #e6edf5); }

        .cap-title-input {
            flex: 1; min-width: 200px;
            font: inherit; font-size: 16px; font-weight: 700;
            color: var(--clx-text-primary, #1a3a5c);
            background: transparent;
            border: 1px solid transparent;
            border-radius: 6px;
            padding: 4px 8px;
        }
        .cap-title-input:hover { border-color: var(--clx-border, #d1dce8); }
        .cap-title-input:focus {
            outline: none;
            border-color: var(--clx-accent, #0f7490);
            box-shadow: 0 0 0 3px rgba(15, 116, 144, 0.12);
            background: var(--clx-bg-surface, #fff);
        }

        .cap-save-status {
            font-size: 12px;
            padding: 3px 9px;
            border-radius: 999px;
            background: #dcfce7; color: #166534;
            border: 1px solid #bbf7d0;
            white-space: nowrap;
        }
        .cap-save-status.saving { background: #fef9c3; color: #854d0e; border-color: #fde68a; }
        .cap-save-status.unsaved { background: #fee2e2; color: #991b1b; border-color: #fecaca; }
        .cap-save-status.offline { background: #ffedd5; color: #9a3412; border-color: #fed7aa; }

        .cap-modules-btn {
            padding: 6px 12px;
            border-radius: 6px;
            font-family: inherit; font-size: 12.5px; font-weight: 600;
            border: 1px solid var(--clx-border, #d1dce8);
            background: var(--clx-bg-surface, #fff);
            color: var(--clx-text-primary, #1a3a5c);
            cursor: pointer;
        }
        .cap-modules-btn:hover { background: var(--clx-bg-hover, #e6edf5); }

        /* Tab bar */
        .cap-tabs {
            background: var(--clx-bg-surface, #fff);
            border-bottom: 1px solid var(--clx-border, #d1dce8);
            padding: 0 20px;
            display: flex; gap: 2px;
            overflow-x: auto;
            white-space: nowrap;
            position: sticky;
            top: calc(56px + 56px); /* below site-header + editor head */
            z-index: 49;
        }
        .cap-tab {
            background: transparent;
            border: none;
            border-bottom: 3px solid transparent;
            padding: 10px 14px;
            font: inherit; font-size: 13px; font-weight: 500;
            color: var(--clx-text-secondary, #4a5568);
            cursor: pointer;
            display: inline-flex; align-items: center; gap: 6px;
            white-space: nowrap;
        }
        .cap-tab:hover { color: var(--clx-text-primary, #1a3a5c); }
        .cap-tab.active {
            color: var(--clx-accent, #0f7490);
            border-bottom-color: var(--clx-accent, #0f7490);
            font-weight: 600;
        }
        .cap-tab-icon { font-size: 14px; }

        /* Tab content */
        .cap-content {
            max-width: 1080px;
            margin: 0 auto;
            padding: 22px 20px 80px;
            width: 100%;
            flex: 1;
        }
        .cap-tab-empty {
            background: var(--clx-bg-surface, #fff);
            border: 1px dashed var(--clx-border, #d1dce8);
            border-radius: 8px;
            padding: 36px 22px;
            text-align: center;
            color: var(--clx-text-muted, #718096);
            font-size: 13px;
            line-height: 1.6;
        }
        .cap-tab-empty strong { color: var(--clx-text-primary, #1a3a5c); display: block; margin-bottom: 6px; font-size: 14px; }

        /* Module toggle drawer (slide-over from right) */
        .cap-drawer-backdrop {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.32);
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        .cap-drawer-backdrop.visible { opacity: 1; pointer-events: auto; }
        .cap-drawer {
            position: fixed;
            top: 0; right: 0; bottom: 0;
            width: min(380px, 90vw);
            background: var(--clx-bg-surface, #fff);
            box-shadow: -4px 0 24px rgba(0,0,0,0.15);
            z-index: 101;
            transform: translateX(100%);
            transition: transform 0.2s;
            display: flex; flex-direction: column;
        }
        .cap-drawer.visible { transform: translateX(0); }
        .cap-drawer-head {
            padding: 14px 18px;
            border-bottom: 1px solid var(--clx-border, #d1dce8);
            display: flex; align-items: center; gap: 10px;
        }
        .cap-drawer-head h3 {
            font-size: 15px; font-weight: 700;
            color: var(--clx-text-primary, #1a3a5c);
            margin: 0;
            flex: 1;
        }
        .cap-drawer-close {
            background: none; border: none;
            font-size: 22px; line-height: 1;
            color: var(--clx-text-muted, #718096);
            cursor: pointer;
            padding: 2px 8px;
            border-radius: 4px;
        }
        .cap-drawer-close:hover { background: rgba(0,0,0,0.05); color: var(--clx-text-primary, #1a3a5c); }
        .cap-drawer-body {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }
        .cap-drawer-cat {
            font-size: 10.5px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.04em;
            color: var(--clx-text-muted, #718096);
            padding: 12px 18px 4px;
        }
        .cap-drawer-row {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 18px;
            cursor: pointer;
        }
        .cap-drawer-row:hover { background: var(--clx-bg-hover, #f7fafd); }
        .cap-drawer-row input[type="checkbox"] {
            width: 16px; height: 16px; accent-color: var(--clx-accent, #0f7490);
            cursor: pointer;
        }
        .cap-drawer-row.locked { opacity: 0.7; }
        .cap-drawer-row.locked input { cursor: not-allowed; }
        .cap-drawer-row .icon { font-size: 16px; width: 22px; text-align: center; }
        .cap-drawer-row .label { flex: 1; font-size: 13px; color: var(--clx-text-primary, #1a3a5c); }
        .cap-drawer-row .lock-tag {
            font-size: 9.5px; text-transform: uppercase;
            color: var(--clx-text-muted, #718096);
            border: 1px solid var(--clx-border, #d1dce8);
            padding: 1px 5px;
            border-radius: 4px;
        }
        .cap-drawer-foot {
            border-top: 1px solid var(--clx-border, #d1dce8);
            padding: 10px 18px;
            font-size: 11.5px;
            color: var(--clx-text-muted, #718096);
        }

        /* ────────── Renderer-shared UI ────────── */
        .cap-panel {
            background: var(--clx-bg-surface, #fff);
            border: 1px solid var(--clx-border, #d1dce8);
            border-radius: 8px;
            margin-bottom: 16px;
            overflow: hidden;
        }
        .cap-panel-head {
            padding: 12px 16px;
            background: var(--clx-bg-surface-2, #f7f9fc);
            border-bottom: 1px solid var(--clx-border, #d1dce8);
        }
        .cap-panel-head h3 {
            margin: 0; font-size: 15px; font-weight: 700;
            color: var(--clx-text-primary, #1a3a5c);
        }
        .cap-panel-body { padding: 16px; }
        .cap-hint {
            font-size: 12px; color: var(--clx-text-muted, #718096);
            margin: 0 0 12px;
        }
        .cap-fineprint {
            font-size: 11px; color: var(--clx-text-muted, #718096);
            margin: 6px 0 0;
        }
        .cap-subhead {
            font-size: 14px; font-weight: 700;
            color: var(--clx-accent, #0f7490);
            margin: 18px 0 8px;
        }
        .cap-grid { display: grid; gap: 10px; margin-bottom: 10px; }
        .cap-grid.g2 { grid-template-columns: repeat(2, 1fr); }
        .cap-grid.g3 { grid-template-columns: repeat(3, 1fr); }
        .cap-grid.g4 { grid-template-columns: repeat(4, 1fr); }
        .cap-grid.g5 { grid-template-columns: repeat(5, 1fr); }
        @media (max-width: 800px) {
            .cap-grid.g4, .cap-grid.g5 { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 480px) {
            .cap-grid.g2, .cap-grid.g3, .cap-grid.g4, .cap-grid.g5 { grid-template-columns: 1fr; }
        }
        .cap-field { display: flex; flex-direction: column; }
        .cap-label {
            font-size: 11px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.04em;
            color: var(--clx-text-secondary, #4a5568);
            margin-bottom: 4px;
        }
        .cap-tf {
            width: 100%; box-sizing: border-box;
            font: inherit; font-size: 13px;
            padding: 7px 9px;
            border: 1px solid var(--clx-border, #d1dce8); border-radius: 5px;
            background: var(--clx-bg-surface, #fff);
            color: var(--clx-text-primary, #1a3a5c);
            resize: vertical;
        }
        .cap-tf:focus {
            outline: none; border-color: var(--clx-accent, #0f7490);
            box-shadow: 0 0 0 2px rgba(15, 116, 144, 0.12);
        }

        /* Score block */
        .cap-score-block {
            background: var(--clx-bg-surface-2, #f7f9fc);
            border: 1px solid var(--clx-border, #d1dce8);
            border-radius: 6px;
            padding: 12px 16px;
            margin: 14px 0 0;
            display: flex; align-items: center; gap: 14px;
        }
        .cap-score-num { font-size: 26px; font-weight: 800; color: var(--clx-accent, #0f7490); line-height: 1; }
        .cap-score-label { font-size: 13px; color: var(--clx-text-secondary, #4a5568); font-weight: 600; }
        .cap-score-risk { margin-left: auto; font-size: 13px; font-weight: 700; padding: 4px 10px; border-radius: 999px; background: rgba(0,0,0,0.04); }
        .cap-score-block.high .cap-score-risk { background: #fee2e2; color: #991b1b; }
        .cap-score-block.moderate .cap-score-risk { background: #fef3c7; color: #854d0e; }
        .cap-score-block.low .cap-score-risk { background: #dcfce7; color: #166534; }

        /* OMEGA table */
        .cap-omega-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .cap-omega-table td { padding: 8px; border: 1px solid var(--clx-border, #d1dce8); vertical-align: top; }
        .cap-omega-key { width: 50px; text-align: center; background: var(--clx-bg-surface-2, #f7f9fc); }
        .cap-omega-letter {
            display: inline-block; width: 30px; height: 30px; line-height: 30px;
            background: var(--clx-accent, #0f7490); color: #fff;
            border-radius: 50%; font-weight: 800; font-size: 13px;
        }
        .cap-omega-label { width: 110px; font-weight: 600; color: var(--clx-text-primary, #1a3a5c); }
        .cap-omega-table textarea { border: none; padding: 4px; resize: vertical; min-height: 32px; background: transparent; }

        /* Medications table */
        .cap-meds-wrap { overflow-x: auto; }
        .cap-meds-table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 700px; }
        .cap-meds-table th, .cap-meds-table td {
            padding: 6px; border: 1px solid var(--clx-border, #d1dce8); vertical-align: top;
        }
        .cap-meds-table th {
            background: var(--clx-bg-surface-2, #f7f9fc); font-weight: 700;
            color: var(--clx-accent, #0f7490); font-size: 11.5px;
            text-align: left;
        }
        .cap-meds-table th small { font-weight: 400; color: var(--clx-text-muted, #718096); display: block; margin-top: 2px; }
        .cap-meds-table textarea { border: none; padding: 4px; resize: vertical; min-height: 36px; font-size: 12px; background: transparent; width: 100%; box-sizing: border-box; }
        .cap-meds-del { width: 36px; text-align: center; }
        .cap-row-del {
            background: none; border: none; font-size: 18px; line-height: 1;
            color: #b91c1c; cursor: pointer; padding: 4px 8px; border-radius: 4px;
        }
        .cap-row-del:hover { background: #fbebeb; }
        .cap-add-row {
            margin-top: 12px; padding: 7px 14px;
            background: var(--clx-accent, #0f7490); color: #fff;
            border: none; border-radius: 5px;
            font-size: 12.5px; font-weight: 600; cursor: pointer;
        }
        .cap-add-row:hover { filter: brightness(1.1); }

        /* Morse */
        .cap-morse-var { margin-bottom: 14px; }
        .cap-morse-var h4 { font-size: 13px; font-weight: 700; color: var(--clx-text-primary, #1a3a5c); margin: 0 0 6px; }
        .cap-morse-opts { display: flex; flex-direction: column; gap: 4px; }
        .cap-morse-opt {
            display: flex; align-items: center; gap: 10px;
            padding: 6px 10px; border: 1px solid var(--clx-border, #d1dce8); border-radius: 5px;
            cursor: pointer; font-size: 13px;
            background: var(--clx-bg-surface, #fff);
        }
        .cap-morse-opt:hover { background: var(--clx-bg-hover, #f7fafd); }
        .cap-morse-opt.selected {
            border-color: var(--clx-accent, #0f7490);
            background: rgba(15, 116, 144, 0.06);
        }
        .cap-morse-opt input { accent-color: var(--clx-accent, #0f7490); }
        .cap-morse-opt span:nth-child(2) { flex: 1; }
        .cap-morse-pts {
            background: var(--clx-accent, #0f7490); color: #fff;
            padding: 1px 8px; border-radius: 999px; font-size: 11px; font-weight: 700;
        }

        /* Braden */
        .cap-braden-factor { margin-bottom: 14px; padding: 12px; border: 1px solid var(--clx-border, #d1dce8); border-radius: 6px; background: var(--clx-bg-surface-2, #f7f9fc); }
        .cap-braden-factor h4 { font-size: 14px; color: var(--clx-accent, #0f7490); margin: 0 0 4px; }
        .cap-braden-defn { font-size: 11.5px; color: var(--clx-text-muted, #718096); font-style: italic; margin: 0 0 10px; }
        .cap-braden-opts { display: grid; gap: 8px; }
        .cap-braden-opts.cols-3 { grid-template-columns: repeat(3, 1fr); }
        .cap-braden-opts.cols-4 { grid-template-columns: repeat(4, 1fr); }
        @media (max-width: 800px) {
            .cap-braden-opts.cols-3, .cap-braden-opts.cols-4 { grid-template-columns: 1fr; }
        }
        .cap-braden-opt {
            display: flex; flex-direction: column;
            padding: 8px 10px; border: 1px solid var(--clx-border, #d1dce8); border-radius: 5px;
            cursor: pointer; background: var(--clx-bg-surface, #fff);
            font-size: 11.5px; line-height: 1.4;
        }
        .cap-braden-opt:hover { border-color: var(--clx-accent, #0f7490); }
        .cap-braden-opt.selected {
            border: 2px solid var(--clx-accent, #0f7490);
            background: rgba(15, 116, 144, 0.06);
            padding: 7px 9px;
        }
        .cap-braden-opt input { display: none; }
        .cap-braden-opt strong { color: var(--clx-accent, #0f7490); display: block; margin-bottom: 4px; font-size: 12px; }
        .cap-braden-desc { color: var(--clx-text-secondary, #4a5568); }

        /* Mini-Cog */
        .cap-careplan-box {
            border: 1px solid var(--clx-border, #d1dce8);
            border-radius: 6px;
            padding: 14px;
            margin-bottom: 12px;
            background: var(--clx-bg-surface-2, #f7f9fc);
        }
        .cap-careplan-box h4 { margin: 0 0 4px; font-size: 14px; color: var(--clx-accent, #0f7490); }
        .cap-careplan-box p { font-size: 13px; margin: 4px 0 0; color: var(--clx-text-secondary, #4a5568); }
        .cap-clock-wrap { background: #fff; padding: 10px; border-radius: 6px; border: 1px solid var(--clx-border, #d1dce8); }
        .cap-btn-sm {
            padding: 5px 10px; font: inherit; font-size: 12px;
            border: 1px solid var(--clx-border, #d1dce8); border-radius: 4px;
            background: var(--clx-bg-surface, #fff); color: var(--clx-text-primary, #1a3a5c);
            cursor: pointer;
        }
        .cap-btn-sm:hover { background: var(--clx-bg-hover, #e6edf5); }

        /* SBAR */
        .cap-sbar-block {
            border-left: 4px solid var(--clx-accent, #0f7490);
            padding: 10px 14px; margin-bottom: 12px;
            background: var(--clx-bg-surface-2, #f7f9fc);
            border-radius: 0 5px 5px 0;
        }
        .cap-sbar-block h4 {
            margin: 0 0 10px; font-size: 14px; font-weight: 700;
            color: var(--clx-text-primary, #1a3a5c);
            display: flex; align-items: center;
        }
        .cap-sbar-letter {
            display: inline-block; width: 26px; height: 26px; line-height: 26px;
            background: var(--clx-accent, #0f7490); color: #fff;
            border-radius: 50%; font-weight: 700; font-size: 13px;
            text-align: center; margin-right: 10px;
        }

        /* Behavior (ABC) */
        .cap-behavior-event {
            border: 1px solid var(--clx-border, #d1dce8);
            border-radius: 6px;
            padding: 14px;
            margin-bottom: 14px;
            background: var(--clx-bg-surface, #fff);
        }
        .cap-behavior-head {
            display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
            padding-bottom: 8px; border-bottom: 1px solid var(--clx-border, #d1dce8);
        }
        .cap-behavior-num {
            font-weight: 700; color: var(--clx-accent, #0f7490);
            flex: 1; font-size: 14px;
        }
        .cap-behavior-section {
            font-size: 12px; font-weight: 700;
            color: var(--clx-accent, #0f7490);
            text-transform: uppercase; letter-spacing: 0.04em;
            margin: 12px 0 6px;
            border-bottom: 1px dashed var(--clx-border, #d1dce8);
            padding-bottom: 4px;
        }

        /* NCSBN */
        .cap-ncsbn-step {
            display: grid; grid-template-columns: 50px 1fr; gap: 12px;
            padding: 14px; border: 1px solid var(--clx-border, #d1dce8);
            border-radius: 6px; margin-bottom: 12px;
            background: var(--clx-bg-surface, #fff);
        }
        .cap-ncsbn-num {
            display: flex; align-items: center; justify-content: center;
            background: var(--clx-accent, #0f7490); color: #fff;
            border-radius: 50%; width: 40px; height: 40px;
            font-size: 16px; font-weight: 800;
        }
        .cap-ncsbn-body h4 {
            margin: 0 0 4px; font-size: 14px; font-weight: 700;
            color: var(--clx-text-primary, #1a3a5c);
        }

        /* Progress Notes */
        .cap-pn-note {
            border: 1px solid var(--clx-border, #d1dce8);
            border-radius: 6px;
            padding: 14px;
            margin-bottom: 14px;
            background: var(--clx-bg-surface, #fff);
        }
        .cap-pn-head {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 10px;
            padding-bottom: 8px; border-bottom: 1px solid var(--clx-border, #d1dce8);
        }
        .cap-pn-num { font-weight: 700; color: var(--clx-accent, #0f7490); flex: 1; font-size: 14px; }
        .cap-pn-format { width: auto; font-weight: 600; }
        .cap-pn-row {
            display: grid; grid-template-columns: 60px 1fr; gap: 10px;
            align-items: start; margin-bottom: 8px;
        }
        .cap-pn-letter {
            background: var(--clx-accent, #0f7490); color: #fff;
            padding: 6px 4px; border-radius: 4px;
            font-weight: 700; font-size: 14px; text-align: center;
            display: flex; flex-direction: column; align-items: center;
            line-height: 1.1;
        }
        .cap-pn-letter small {
            display: block; font-weight: 400; font-size: 9px;
            margin-top: 2px; opacity: 0.85;
        }
        .cap-pn-help {
            margin-top: 18px; font-size: 12.5px;
        }
        .cap-pn-help summary {
            cursor: pointer; color: var(--clx-accent, #0f7490);
            font-weight: 600;
        }
        .cap-pn-help[open] {
            padding: 10px;
            background: var(--clx-bg-surface-2, #f7f9fc);
            border-radius: 6px;
            margin-top: 10px;
        }
        .cap-pn-help p { margin: 4px 0; line-height: 1.6; }

        /* Care Plan */
        .cap-cp-box {
            border: 1px solid var(--clx-border, #d1dce8);
            border-radius: 6px;
            padding: 14px;
            margin-bottom: 12px;
            background: var(--clx-bg-surface-2, #f7f9fc);
        }
        .cap-cp-box h4 { margin: 0 0 4px; font-size: 14px; color: var(--clx-accent, #0f7490); }
        .cap-cp-iv {
            margin-top: 12px; padding: 10px;
            border: 1px solid var(--clx-border, #d1dce8);
            border-radius: 5px;
            background: var(--clx-bg-surface, #fff);
        }
        .cap-cp-iv h5 {
            font-size: 13px; font-weight: 700;
            color: var(--clx-text-primary, #1a3a5c);
            margin: 0 0 8px;
            display: flex; align-items: center; gap: 8px;
        }
        .cap-cp-iv-tag {
            background: var(--clx-accent, #0f7490); color: #fff;
            padding: 2px 8px; border-radius: 4px;
            font-size: 11px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.04em;
        }

        /* Head-to-Toe — simple labeled rows */
        .cap-h2t-row {
            margin-bottom: 14px;
            padding: 12px;
            border: 1px solid var(--clx-border, #d1dce8);
            border-radius: 6px;
            background: var(--clx-bg-surface, #fff);
        }
        .cap-h2t-row .cap-label {
            color: var(--clx-accent, #0f7490);
            font-size: 13px;
            text-transform: none;
            letter-spacing: normal;
        }

        /* Hendrich — checklist rows */
        .cap-hendrich-list { display: flex; flex-direction: column; gap: 4px; }
        .cap-hendrich-row {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 12px;
            border: 1px solid var(--clx-border, #d1dce8);
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            background: var(--clx-bg-surface, #fff);
        }
        .cap-hendrich-row:hover { background: var(--clx-bg-hover, #f7fafd); }
        .cap-hendrich-row.selected {
            border-color: var(--clx-accent, #0f7490);
            background: rgba(15, 116, 144, 0.06);
        }
        .cap-hendrich-row input { accent-color: var(--clx-accent, #0f7490); }
        .cap-hendrich-label { flex: 1; color: var(--clx-text-primary, #1a3a5c); }
        .cap-hendrich-pts {
            background: var(--clx-accent, #0f7490); color: #fff;
            padding: 1px 8px; border-radius: 999px; font-size: 11px; font-weight: 700;
        }

        /* APA References */
        .cap-ref-row {
            display: grid; grid-template-columns: 24px 1fr 36px;
            gap: 8px; align-items: start;
            margin-bottom: 8px;
        }
        .cap-ref-num {
            font-weight: 700;
            font-size: 14px;
            color: var(--clx-text-muted, #718096);
            line-height: 1.8;
        }

        /* Concept Map */
        .cap-cm-center {
            padding: 14px;
            background: var(--clx-accent, #0f7490);
            color: #fff;
            border-radius: 8px;
            margin-bottom: 14px;
        }
        .cap-cm-center .cap-label { color: #fff; }
        .cap-cm-center textarea {
            background: rgba(255,255,255,0.96);
            color: var(--clx-text-primary, #1a3a5c);
        }
        .cap-cm-problem {
            border: 1px solid var(--clx-border, #d1dce8);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 12px;
            background: var(--clx-bg-surface, #fff);
        }
        .cap-cm-head {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 10px;
        }
        .cap-cm-name { flex: 1; font-weight: 700; font-size: 14px; }
        .cap-cm-grid { display: flex; flex-direction: column; gap: 8px; }

        /* Case Study — collapsible numbered sections */
        .cap-cs-section {
            border: 1px solid var(--clx-border, #d1dce8);
            border-radius: 6px;
            margin-bottom: 12px;
            background: var(--clx-bg-surface, #fff);
            overflow: hidden;
        }
        .cap-cs-section summary {
            padding: 12px 16px;
            cursor: pointer;
            background: var(--clx-bg-surface-2, #f7f9fc);
            font-weight: 700;
            color: var(--clx-text-primary, #1a3a5c);
            display: flex; align-items: center; gap: 12px;
            list-style: none;
        }
        .cap-cs-section summary::-webkit-details-marker { display: none; }
        .cap-cs-section[open] summary { border-bottom: 1px solid var(--clx-border, #d1dce8); }
        .cap-cs-num {
            display: inline-flex; align-items: center; justify-content: center;
            background: var(--clx-accent, #0f7490); color: #fff;
            border-radius: 50%; width: 28px; height: 28px;
            font-weight: 800; font-size: 13px;
        }
        .cap-cs-section summary::after {
            content: '▾'; margin-left: auto;
            color: var(--clx-text-muted, #718096);
            transition: transform 0.15s;
        }
        .cap-cs-section[open] summary::after { transform: rotate(180deg); }
        .cap-cs-body { padding: 14px; }

        /* ────────── Mobile polish ────────── */
        @media (max-width: 600px) {
            .cap-editor-head { padding: 8px 10px; gap: 8px; }
            .cap-back { font-size: 11.5px; padding: 4px 8px; }
            .cap-title-input { min-width: 120px; font-size: 14px; }
            .cap-modules-btn { padding: 5px 9px; font-size: 11.5px; }
            .cap-tabs { padding: 0 10px; top: calc(56px + 92px); }
            .cap-tab { padding: 9px 10px; font-size: 12px; }
            .cap-content { padding: 14px 12px 60px; }
            .cap-drawer { width: 88vw; }
            .cap-modal.wide { max-width: 100%; }
            .cap-pn-row { grid-template-columns: 1fr; }
            .cap-pn-letter { padding: 4px 8px; flex-direction: row; gap: 6px; }
            .cap-pn-letter small { display: inline; margin-top: 0; }
            .cap-ncsbn-step { grid-template-columns: 36px 1fr; gap: 8px; padding: 10px; }
            .cap-ncsbn-num { width: 30px; height: 30px; font-size: 13px; }
            .cap-ref-row { grid-template-columns: 18px 1fr 28px; }
            .cap-cm-head { flex-wrap: wrap; }
        }

        /* ────────── Print stylesheet ──────────
           When printing from /clinical/packet/, hide all chrome and let
           the editor body flow as plain content. The PRIMARY export path
           is the PDF button — print is a back-up. */
        @media print {
            .site-header,
            .cap-editor-head,
            .cap-tabs,
            .cap-drawer,
            .cap-drawer-backdrop,
            #toastContainer,
            .bsn-offline-banner { display: none !important; }
            body { background: #fff !important; }
            .cap-content { max-width: none; padding: 0 !important; }
            .cap-panel { box-shadow: none !important; border: 1px solid #888; page-break-inside: avoid; }
            .cap-tf, .cap-tf:focus { box-shadow: none !important; border-color: #aaa; }
            .cap-cs-section, .cap-behavior-event, .cap-pn-note,
            .cap-cm-problem, .cap-h2t-row, .cap-cp-box {
                page-break-inside: avoid;
            }
        }

        [data-theme="dark"] .cap-editor-head,
        [data-theme="dark"] .cap-tabs,
        [data-theme="dark"] .cap-drawer,
        [data-theme="dark"] .cap-panel { background: var(--clx-bg-surface, #1a202c); }
        [data-theme="dark"] .cap-panel-head,
        [data-theme="dark"] .cap-omega-key,
        [data-theme="dark"] .cap-meds-table th,
        [data-theme="dark"] .cap-braden-factor,
        [data-theme="dark"] .cap-careplan-box,
        [data-theme="dark"] .cap-sbar-block { background: rgba(255, 255, 255, 0.03); }
        [data-theme="dark"] .cap-tf,
        [data-theme="dark"] .cap-morse-opt,
        [data-theme="dark"] .cap-braden-opt,
        [data-theme="dark"] .cap-clock-wrap { background: rgba(255, 255, 255, 0.04); }
    </style>
</head>
<body>
    <header class="site-header">
        <a href="/home/" class="logo-link"><img src="/logo-dark.svg" alt="BendBSN" class="site-logo" onerror="this.src='/logo-mark.svg'"></a>
    </header>

    <!-- Editor head: back, title, save status, module toggle, export -->
    <div class="cap-editor-head">
        <a href="/clinical/" class="cap-back">← My Packets</a>
        <input type="text" id="capTitle" class="cap-title-input" placeholder="Untitled packet" maxlength="80">
        <span class="cap-save-status" id="capSaveStatus">Saved</span>
        <button class="cap-modules-btn" onclick="openModuleDrawer()">⚙️ Modules</button>
        <button class="cap-modules-btn" id="capExportPdfBtn" onclick="exportPacketPdf(this)" title="Export to PDF">📄 Export PDF</button>
    </div>

    <!-- Tab bar (rendered dynamically based on enabledModules) -->
    <nav class="cap-tabs" id="capTabs" role="tablist"></nav>

    <main class="cap-content" id="capContent" role="main"></main>

    <!-- Module toggle drawer -->
    <div class="cap-drawer-backdrop" id="capDrawerBackdrop" onclick="closeModuleDrawer()"></div>
    <aside class="cap-drawer" id="capDrawer" role="dialog" aria-label="Module toggles">
        <div class="cap-drawer-head">
            <h3>⚙️ Modules</h3>
            <button class="cap-drawer-close" onclick="closeModuleDrawer()" aria-label="Close">&times;</button>
        </div>
        <div class="cap-drawer-body" id="capDrawerBody"></div>
        <div class="cap-drawer-foot">
            Toggling a module OFF wipes its data after a confirmation. Toggle back ON gives you a clean section.
        </div>
    </aside>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="/shared/header.js"></script>
    <script src="/shared/toast.js"></script>
    <script src="/clinical/cap-modules.js"></script>
    <script src="/clinical/cap-renderers.js"></script>
    <script src="/clinical/cap-pdf.js"></script>
    <script>
        // ─── Theme init ───
        (function () {
            const t = localStorage.getItem('bendbsn_theme') || 'light';
            document.documentElement.setAttribute('data-theme', t);
        })();

        // ─── Read packet ID ───
        function getPacketId() {
            const p = new URLSearchParams(window.location.search);
            return p.get('id') || '';
        }
        const PACKET_ID = getPacketId();
        if (!PACKET_ID) {
            document.getElementById('capContent').innerHTML =
                '<div class="cap-tab-empty"><strong>No packet selected.</strong>' +
                '<a href="/clinical/" style="color:var(--clx-accent);">← Back to My Packets</a></div>';
        }

        // ─── Firebase init ───
        const firebaseConfig = {
            apiKey: "AIzaSyDaH4lozarByia837FNRV_-A1fDYiTQHHQ",
            authDomain: "bendbsn-17377.firebaseapp.com",
            databaseURL: "https://bendbsn-17377-default-rtdb.firebaseio.com",
            projectId: "bendbsn-17377",
            storageBucket: "bendbsn-17377.appspot.com",
            messagingSenderId: "762882187702",
            appId: "1:762882187702:web:81c97c9eae005666796117"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        const CAP = window.CAP_MODULES;
        const LS_BACKUP_KEY = 'bendbsn_cap_local_' + PACKET_ID;

        // ─── State ───
        let currentUid = null;
        let packetRef = null;
        // Authoritative packet — { meta: {...}, state: {...} }. Mutated by user edits + drawer.
        let packet = null;
        // Currently active tab id (one of enabledModules)
        let activeTab = null;
        // Autosave debounce timer
        let saveTimer = null;
        let lastSaveErrorAt = 0;
        let pendingSave = false;

        function setSaveStatus(state) {
            const el = document.getElementById('capSaveStatus');
            el.className = 'cap-save-status ' + (state.cls || 'saved');
            el.textContent = state.text;
        }

        function esc(s) { return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

        // ─── Auth + load ───
        auth.onAuthStateChanged(function (user) {
            if (!user) {
                showToast('Please sign in.', 'warning');
                setTimeout(function () { window.location.href = '/'; }, 1500);
                return;
            }
            if (!PACKET_ID) return;
            currentUid = user.uid;
            packetRef = database.ref('emr-clinical/packets/' + currentUid + '/' + PACKET_ID);
            loadPacket();
        });

        function loadPacket() {
            setSaveStatus({ cls: 'saving', text: 'Loading…' });
            packetRef.once('value').then(function (snap) {
                const val = snap.val();
                if (!val) {
                    document.getElementById('capContent').innerHTML =
                        '<div class="cap-tab-empty"><strong>Packet not found.</strong>' +
                        '<a href="/clinical/" style="color:var(--clx-accent);">← Back to My Packets</a></div>';
                    return;
                }
                packet = {
                    meta: val.meta || {},
                    state: val.state || {}
                };
                if (!Array.isArray(packet.meta.enabledModules)) packet.meta.enabledModules = ['info', 'notes'];
                writeLocalBackup();
                renderEditor();
                setSaveStatus({ cls: 'saved', text: 'Saved' });
            }).catch(function (err) {
                console.error('[CAP editor] load failed:', err);
                // Try local backup
                try {
                    const raw = localStorage.getItem(LS_BACKUP_KEY);
                    if (raw) {
                        packet = JSON.parse(raw);
                        if (!Array.isArray(packet.meta.enabledModules)) packet.meta.enabledModules = ['info', 'notes'];
                        renderEditor();
                        setSaveStatus({ cls: 'offline', text: 'Offline — local backup' });
                        showToast('Could not reach Firebase. Loaded local backup.', 'warning');
                        return;
                    }
                } catch (e) {}
                document.getElementById('capContent').innerHTML =
                    '<div class="cap-tab-empty"><strong>Could not load packet.</strong>' + esc(err.message || String(err)) + '</div>';
            });
        }

        function writeLocalBackup() {
            try { localStorage.setItem(LS_BACKUP_KEY, JSON.stringify(packet)); } catch (e) {}
        }

        // ─── Render: title, tabs, body ───
        function renderEditor() {
            // Title
            const titleEl = document.getElementById('capTitle');
            titleEl.value = packet.meta.title || '';
            titleEl.placeholder = packetFallbackTitle();
            // Tabs
            renderTabs();
            // Initial active tab — from URL hash, or first enabled
            const fromHash = (location.hash || '').replace(/^#/, '');
            if (fromHash && packet.meta.enabledModules.indexOf(fromHash) !== -1) {
                activeTab = fromHash;
            } else {
                activeTab = packet.meta.enabledModules[0] || 'info';
            }
            renderActiveTab();
        }

        function packetFallbackTitle() {
            const parts = [];
            if (packet.meta.residentInitials) parts.push(packet.meta.residentInitials);
            if (packet.meta.date) parts.push(packet.meta.date);
            if (packet.meta.site) parts.push(packet.meta.site);
            return parts.join(' · ') || 'Untitled packet';
        }

        function renderTabs() {
            const tabsEl = document.getElementById('capTabs');
            const html = packet.meta.enabledModules.map(function (id) {
                const m = CAP.MODULE_BY_ID[id];
                if (!m) return '';
                const isActive = id === activeTab ? ' active' : '';
                return '<button class="cap-tab' + isActive + '" data-mod="' + esc(id) + '" onclick="switchTab(\'' + esc(id) + '\')">' +
                    '<span class="cap-tab-icon">' + m.icon + '</span>' + esc(m.label) +
                '</button>';
            }).join('');
            tabsEl.innerHTML = html || '<div style="padding:14px;color:var(--clx-text-muted);font-size:13px;font-style:italic;">No modules enabled. Click ⚙️ Modules to add some.</div>';
        }

        window.switchTab = function (id) {
            activeTab = id;
            history.replaceState(null, '', '?id=' + encodeURIComponent(PACKET_ID) + '#' + id);
            // Refresh tab active state without re-rendering bodies
            document.querySelectorAll('.cap-tab').forEach(function (b) {
                b.classList.toggle('active', b.dataset.mod === id);
            });
            renderActiveTab();
        };

        // ─── Module body renderer ───
        // Looks up the renderer in CAP_RENDERERS and calls it with the module's
        // state slice + an onChange callback that triggers autosave.
        function renderActiveTab() {
            const contentEl = document.getElementById('capContent');
            if (!activeTab) { contentEl.innerHTML = ''; return; }
            const m = CAP.MODULE_BY_ID[activeTab];
            if (!m) { contentEl.innerHTML = ''; return; }
            if (!packet.state) packet.state = {};
            if (!packet.state[activeTab]) packet.state[activeTab] = {};
            const modState = packet.state[activeTab];
            const renderer = window.CAP_RENDERERS && window.CAP_RENDERERS[activeTab];
            if (renderer) {
                renderer(contentEl, modState, queueAutosave);
            } else {
                contentEl.innerHTML =
                    '<div class="cap-tab-empty">' +
                        '<strong>' + esc(m.icon) + ' ' + esc(m.label) + '</strong>' +
                        'No renderer registered for this module yet.' +
                    '</div>';
            }
        }

        // ─── Title editing ───
        document.getElementById('capTitle').addEventListener('input', function (e) {
            packet.meta.title = e.target.value;
            queueAutosave();
        });

        // ─── Autosave ───
        function queueAutosave() {
            setSaveStatus({ cls: 'saving', text: 'Saving…' });
            writeLocalBackup();
            clearTimeout(saveTimer);
            saveTimer = setTimeout(commitSave, 400);
        }
        function commitSave() {
            if (!packetRef || !packet) return;
            packet.meta.updatedAt = Date.now();
            pendingSave = true;
            packetRef.set(packet).then(function () {
                pendingSave = false;
                setSaveStatus({ cls: 'saved', text: 'Saved' });
            }).catch(function (err) {
                console.warn('[CAP editor] save failed:', err);
                pendingSave = false;
                setSaveStatus({ cls: 'offline', text: 'Offline — backed up locally' });
                lastSaveErrorAt = Date.now();
                // Retry once after 5s
                setTimeout(function () {
                    if (Date.now() - lastSaveErrorAt < 4500) return; // user typed again
                    commitSave();
                }, 5000);
            });
        }
        // Save on tab close / blur as a safety net
        window.addEventListener('beforeunload', function () {
            if (pendingSave || saveTimer) {
                clearTimeout(saveTimer);
                commitSave();
            }
        });

        // ─── Module toggle drawer ───
        window.openModuleDrawer = function () {
            renderDrawer();
            document.getElementById('capDrawer').classList.add('visible');
            document.getElementById('capDrawerBackdrop').classList.add('visible');
        };
        window.closeModuleDrawer = function () {
            document.getElementById('capDrawer').classList.remove('visible');
            document.getElementById('capDrawerBackdrop').classList.remove('visible');
        };
        document.addEventListener('keydown', function (ev) {
            if (ev.key === 'Escape' && document.getElementById('capDrawer').classList.contains('visible')) {
                closeModuleDrawer();
            }
        });

        function renderDrawer() {
            const body = document.getElementById('capDrawerBody');
            const enabled = new Set(packet.meta.enabledModules || []);
            const grouped = CAP.modulesByCategory();
            let html = '';
            CAP.CATEGORY_ORDER.forEach(function (cat) {
                const mods = grouped[cat];
                if (!mods || !mods.length) return;
                html += '<div class="cap-drawer-cat">' + esc(cat) + '</div>';
                mods.forEach(function (m) {
                    const isOn = enabled.has(m.id);
                    const locked = !!m.alwaysOn;
                    html += '<label class="cap-drawer-row' + (locked ? ' locked' : '') + '">' +
                        '<input type="checkbox" data-mod="' + esc(m.id) + '" ' +
                            (isOn ? 'checked ' : '') + (locked ? 'disabled' : '') + '>' +
                        '<span class="icon">' + m.icon + '</span>' +
                        '<span class="label">' + esc(m.label) + '</span>' +
                        (locked ? '<span class="lock-tag">always on</span>' : '') +
                    '</label>';
                });
            });
            body.innerHTML = html;
            // Wire toggles
            body.querySelectorAll('input[type="checkbox"][data-mod]').forEach(function (cb) {
                cb.addEventListener('change', function () { handleModuleToggle(cb); });
            });
        }

        function handleModuleToggle(cb) {
            const modId = cb.dataset.mod;
            const m = CAP.MODULE_BY_ID[modId];
            if (!m) return;
            const enabled = new Set(packet.meta.enabledModules || []);
            const turningOn = cb.checked;
            if (turningOn) {
                enabled.add(modId);
                packet.meta.enabledModules = Array.from(enabled);
                if (activeTab === null || !packet.meta.enabledModules.includes(activeTab)) activeTab = modId;
                renderTabs();
                renderActiveTab();
                queueAutosave();
                return;
            }
            // Turning OFF — confirm + wipe (per user decision: wipe with confirm).
            const hasData = packet.state && packet.state[modId] && Object.keys(packet.state[modId]).length > 0;
            const proceed = function () {
                enabled.delete(modId);
                packet.meta.enabledModules = Array.from(enabled);
                if (packet.state) delete packet.state[modId];
                if (activeTab === modId) activeTab = packet.meta.enabledModules[0] || null;
                renderDrawer();
                renderTabs();
                renderActiveTab();
                queueAutosave();
            };
            if (!hasData) { proceed(); return; }
            const cb_ = cb; // capture for re-check on cancel
            if (window.showConfirmModal) {
                showConfirmModal('Hide ' + m.label + '?',
                    'This will delete the data you\'ve entered in this module. Continue?',
                    proceed,
                    {
                        danger: true, confirmText: 'Delete + hide',
                        onCancel: function () { cb_.checked = true; }
                    });
            } else if (confirm('Delete data in ' + m.label + '?')) {
                proceed();
            } else {
                cb_.checked = true;
            }
        }

        // ─── PDF export ───
        // jsPDF is lazy-loaded (large library, only fetched when student
        // clicks Export). Once loaded, hand off to CAP_PDF.generate(packet).
        let _jsPdfLoaded = false;
        function loadJsPdf() {
            if (_jsPdfLoaded) return Promise.resolve();
            return new Promise(function (resolve, reject) {
                const s = document.createElement('script');
                s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
                s.onload = function () { _jsPdfLoaded = true; resolve(); };
                s.onerror = function () { reject(new Error('Failed to load jsPDF')); };
                document.head.appendChild(s);
            });
        }
        window.exportPacketPdf = function (btnEl) {
            if (!packet) { showToast('Packet not loaded yet.', 'warning'); return; }
            const orig = btnEl.textContent;
            btnEl.disabled = true;
            btnEl.textContent = '⏳ Generating…';
            // Make sure any pending edits are flushed before exporting
            if (saveTimer) { clearTimeout(saveTimer); commitSave(); }
            loadJsPdf().then(function () {
                if (!window.CAP_PDF) throw new Error('CAP_PDF module not loaded');
                window.CAP_PDF.generate(packet);
                showToast('PDF generated.', 'success');
            }).catch(function (err) {
                console.error('[CAP] PDF export failed:', err);
                showToast('PDF export failed: ' + (err.message || err), 'error');
            }).then(function () {
                btnEl.disabled = false;
                btnEl.textContent = orig;
            });
        };
    </script>
</body>
</html>
